name: content-platform
version: "2.3.0"
tier: 1
description: >
  Reference catalog of the SpiderPublish content-platform MCP tools.
  Each entry names the tool, its category, and a one-line use case.
  The canonical JSON Schema for each tool lives in `@spideriq/mcp-publish` —
  this file is human/agent reading. Matches `@spideriq/mcp-publish@1.5.0`.

  v2.1.0 (2026-04-24): added `auth.get_whoami`, `link_audit.content_audit_links`,
  `component_preview.component_preview`, plus `auto_extract_css`, `chrome_auto_skip`,
  and `empty_prop_override` behavior notes. Closes 8 Apr-23 client session reports.

  v2.2.0 (2026-04-24): added `duplicate.*` primitives (`content_duplicate_page` /
  `_block` / `_post` / `_doc`). Phase A of the template-gallery / section-library /
  import-adapter follow-on plan. Every later phase composes on these.

  v2.3.0 (2026-05-05): Marketplace V2 agent surface — 6 new tools for
  finding marketplace assets by intent (mood / palette / brand-fit /
  scene-type) and curating discoverability metadata. See
  `marketplace_v2_axes` block at the end for the full vocabulary.

tools:
  pages:
    - content_list_pages
    - content_create_page
    - content_get_page
    - content_update_page
    - content_delete_page
    - content_publish_page
    - content_unpublish_page
  posts:
    - content_list_posts
    - content_create_post
    - content_get_post
    - content_update_post
    - content_delete_post
    - content_publish_post
    - content_unpublish_post
    - content_set_post_status
    - content_set_post_related
    - content_list_featured_posts
    - content_search_posts
  authors:
    - content_list_authors
    - content_create_author
    - content_get_author
    - content_update_author
    - content_delete_author
  tags:
    - content_list_tags
    - content_create_tag
    - content_update_tag
    - content_delete_tag
  categories:
    - content_list_categories
    - content_create_category
    - content_update_category
    - content_delete_category
  docs:
    - content_get_docs_tree
    - content_create_doc
  navigation:
    - content_get_navigation
    - content_update_navigation
  settings:
    - content_get_settings
    - content_update_settings
  domains:
    - content_list_domains
    - content_add_domain
    - content_verify_domain
    - content_set_primary_domain
    - content_delete_domain
  components:
    - content_list_components
    - content_create_component
    - content_get_component
    - content_get_component_by_slug
    - content_update_component
    - content_delete_component
    - content_publish_component
    - content_archive_component
    - content_list_component_versions
    - content_list_cdn_allowlist
    - content_get_build_status
  component_propagation:
    # One-shot tools that collapse 5-10 manual API calls into a single safe mutation.
    - component_update_and_propagate   # update HTML/CSS + auto-bump version + update every page that references the component
    - component_rollback               # restore a previous published component version as a new draft
  section_overrides:
    # Dashboard shortcuts for per-tenant section / layout overrides without rewriting a theme.
    - content_override_section         # override header/footer/sidebar/etc for this client
    - content_apply_layout_preset      # apply blank / chromed / minimal layout
    - content_get_section_source       # effective Liquid source (override if present, else theme default)
  directory:
    # SEO-friendly programmatic directory pages (category → city → listing).
    - directory_list_categories
    - directory_create_category
    - directory_get_category
    - directory_update_category
    - directory_delete_category
    - directory_list_listings
    - directory_upsert_listing
    - directory_bulk_upsert_listings
    - directory_import_from_idap       # pull normalized business data from an IDAP lead bundle
    - directory_delete_listing
  playbook:
    # Task → tool-call sequence lookup. Agents call this FIRST when a task sounds vague.
    - content_get_playbook
  scroll_sequence:
    # One-shot video → scroll-linked image sequence hero on a page.
    - video_to_scroll_sequence
  local_upload:
    # Direct local-file upload path (no public URL required) for agents with filesystem access.
    - upload_local_file
    - upload_local_directory
  auth:
    # 2026-04-24: confirm which tenant your PAT is bound to before destructive ops.
    - get_whoami                       # returns {client_id, project_name, email, scopes, token_expires_at, ...}
  link_audit:
    # 2026-04-24: walks every published page's blocks + nav menus, validates internal links.
    - content_audit_links              # returns {valid_count, broken[{path, source, reason}], proposed_redirects, known_redirects}
  component_preview:
    # 2026-04-24: iframe-render a single component in isolation (~100-300ms). Use before full-site deploy.
    - component_preview                # returns {html (Shadow-DOM-wrapped), css, js, custom_element_tag, merged_props, framework?, bundle_url?}
  duplicate:
    # 2026-04-24: cheap primitive — fork an existing page/post/doc/block as a draft.
    # Returns status='draft', fresh UUIDs on every block, auto-generated `{slug}-copy[-N]` slug.
    # NOT gated by dry_run/confirm_token (net-additive new row, not destructive overwrite).
    - content_duplicate_page           # body: {new_slug?}; returns the new draft PageResponse
    - content_duplicate_block          # body: {position?: 'before'|'after'|<int>}; deep-copies one block in place
    - content_duplicate_post           # body: {new_slug?}; returns new draft PostResponse
    - content_duplicate_doc            # body: {new_slug?}; copy lives as a sibling under the same parent_id
  marketplace:
    # 2026-05-05 (Phase G): agent-discovery surface across the 3 marketplace
    # tables (bg-videos, components, site-templates). Search filters on the
    # 4 universal axes (mood / palette / brand_fit_tags / scene_type) +
    # per-asset agent_meta JSONB. The 4 mutation tools are Phase 11+12 gated
    # and default dry_run=true.
    - marketplace_search                 # GET /content/marketplace/search — cross-table by mood/palette/brand_fit/scene_type/agent_meta/asset_types
    - list_data_sources                  # GET /content/data-sources — 9 internal sources for kind='dynamic' bindings (parent_id walk for IDAP)
    - set_component_kind                 # PATCH /components/{id} kind ∈ static|interactive|dynamic|extension. Phase A CHECK constraints backstop invariants.
    - set_component_agent_meta           # PATCH /components/{id} mood/palette/brand_fit_tags/scene_type/agent_meta (ComponentAgentMeta, extra='forbid')
    - set_bg_video_agent_meta            # PATCH /bg-videos/{slug} same shape but BgVideoAgentMeta keys; super_admin only
    - set_site_template_agent_meta       # PATCH /site-templates/{slug} same shape but SiteTemplateAgentMeta keys; super_admin only

gated_with_dry_run:
  - content_publish_page
  - content_unpublish_page
  - content_delete_page
  - content_update_settings
  - content_publish_component
  - content_archive_component
  - content_delete_component
  - content_deploy_site
  - component_update_and_propagate
  - component_rollback
  - directory_delete_listing
  - directory_delete_category
  # Marketplace V2 (Phase G, 2026-05-05) — default dry_run=true
  - set_component_kind
  - set_component_agent_meta
  - set_bg_video_agent_meta
  - set_site_template_agent_meta
  - content_insert_section

blog_workflow:
  body_format: tiptap_json
  read_increments_view_count: true
  soft_deleted_authors: true        # deleted_at column; pass include_deleted=true to see
  tags_flat: true
  categories_hierarchical: true     # parent_id linkage

directory_workflow:
  slug_shape: "/{category}/{city}/{listing}"
  three_level_pages: true           # /directory, /directory/{cat}, /directory/{cat}/{city}, /directory/{cat}/{city}/{listing}
  sitemap_inclusion: automatic      # listings + categories + cities are added to /sitemap.xml on publish
  bulk_import_source: idap          # `directory_import_from_idap` expects an IDAP bundle id

propagation_workflow:
  version_bump_modes: [patch, minor, major]
  pages_filter: optional            # pass pages=[slug1,slug2] to stage the rollout, omit to touch every consuming page
  preview_first: true               # dry_run=true returns affected_pages + confirm_token
  safety_pair: component_rollback   # if propagation breaks something, rollback undoes it in one call

auto_extract_css:
  # 2026-04-24: opt-in flag on component_create / component_update for Tilda/Webflow imports
  # whose HTML is saturated with inline <style> blocks. Off by default to preserve the
  # explicit-over-magical contract for hand-authored components.
  applies_to: [content_create_component, content_update_component]
  default: false
  behavior: >
    When true, the server regex-extracts every <style>...</style> block from html_template
    and appends the contents to the css field before the loud-error inline-style validator
    runs. Agents get a clean html_template + a consolidated css, in one call.

chrome_auto_skip:
  # 2026-04-24: if a page block resolves to a component with category='header' (or 'footer'),
  # the renderer auto-suppresses the native {% section 'header' %} / 'footer'. No more
  # double-chrome workarounds (nukeUI polling, template='blank', conditional copyright_text).
  triggered_by:
    - "component.category == 'header' → native header section skipped"
    - "component.category == 'footer' → native footer section skipped"
  manual_override:
    field: content_pages.custom_fields
    shape:
      hide_native_chrome: true       # suppresses both
      hide_native_header: true       # granular
      hide_native_footer: true       # granular

empty_prop_override:
  # 2026-04-24: the {% component %} tag now deletes empty-string / null props AFTER the
  # default_props ← blockProps merge, so `props.image = ""` correctly suppresses
  # `default_props.image = "/placeholder.jpg"`. Falsy-but-meaningful values (0, false)
  # are preserved.
  semantic: "block.props empty-string falls through to default_props being nil"

canonical_see_also:
  - templates-engine
  - upload-host-media
  - booking
  - recipes/scroll-sequence
  - recipes/preview-iteration
  - recipes/directory
  - recipes/component-update-and-propagate
  - recipes/component-rollback
  - recipes/link-audit
  - recipes/tilda-migration
  - recipes/marketplace-search-and-insert

# ─────────────────────────────────────────────────────────────────────────
# Marketplace V2 — agent-discovery vocabulary (Phase G, 2026-05-05)
# ─────────────────────────────────────────────────────────────────────────
# Used by marketplace_search filters AND by set_*_agent_meta when curating
# an asset for findability. Strict at the API boundary — unknown values 422.
# Vocabulary growth ships via SDK release, not via DB migration.

marketplace_v2_axes:
  universal:
    # 4 columns shared across content_components / content_bg_videos /
    # content_site_templates. Top-level fields, NOT inside agent_meta.
    mood:
      type: "TEXT[] (any-of match in marketplace_search)"
      values: [calm, energetic, bold, confident, dreamy, futuristic, urban,
               minimal, warm, sensory, editorial, professional, friendly,
               clear, technical, credible]
    palette:
      type: "TEXT[] (free-form, capped at 12 entries on write)"
      common_values: [monochrome, deep-blue, cream, neutral-warm, nature-green,
                       warm-earth, neon-accent, warm-orange, rich-brown,
                       cinematic, blue-night, brand-led]
    brand_fit_tags:
      type: "TEXT[] (any-of match)"
      values: [saas, agency, ecommerce, fintech, real-estate, hospitality,
               restaurant, wellness, healthcare, blog, publication, personal,
               tech, design, consulting, outdoor, lifestyle]
    scene_type:
      type: "VARCHAR (single value)"
      component_values: [hero-bold, feature-grid, pricing-tiers, social-proof,
                          faq-accordion, conversion-cta, navigation-header,
                          navigation-footer, data-collection-form,
                          editorial-content, team-grid]
      bg_video_values: [city-aerial, nature-landscape, abstract-motion,
                         food-prep, people-lifestyle, tech-hardware]
      site_template_values: [marketing-site, docs-site, directory-site,
                              portfolio-site]

  per_asset:
    # JSONB column on each table. Pydantic-validated with extra='forbid' —
    # unknown keys 422. Pass to marketplace_search as `agent_meta` filter,
    # to set_*_agent_meta as the body.
    bg_video:
      pace: [slow, medium, fast]                      # slow=meditative, medium=narrative, fast=energetic
      time_of_day: [dawn, day, dusk, night]
      weather: [clear, cloudy, rain, snow, fog, stormy]   # NULL = indoor / abstract
      has_people: bool
      aspect_ratio: ["16:9", "9:16", "1:1", "4:3", "21:9"]
      has_audio: bool
      music_tempo_bpm: "int 20-300 (only meaningful when has_audio=true)"
      transcript: "string ≤2000 chars"
    component:
      interaction_pattern: [static, click, hover, scroll, timer, form, drag]
      trigger_kind: [page-load, scroll-into-view, click, hover, exit-intent,
                      timer-fixed-date, timer-elapsed, form-submit, geo-match, none]
      placement: [above-fold, below-fold, side-rail, modal, toast, footer, header, any]
      motion_safety: bool                             # TRUE = honours prefers-reduced-motion
      accessibility_notes: "string ≤1000 chars"
      conversion_strategy: [primary-cta, secondary-cta, trust, scarcity,
                             social-proof, education, navigation, none]
    site_template:
      page_count: "int 1-200"
      has_blog: bool
      has_pricing: bool
      has_directory: bool                             # programmatic SEO target
      has_booking: bool                               # SpiderBook integration
      conversion_strategy: "(same as component.conversion_strategy)"
      style_aesthetic: [minimal, bold, editorial, playful, premium, technical, brutalist, soft]
      component_set: "string[] of component slugs the template ships with (≤100)"

  data_sources:
    # 9 entries returned by list_data_sources. Use as source_id when binding
    # kind='dynamic' components.
    internal:
      - {id: posts,           label: Posts,                  is_collection: true}
      - {id: authors,         label: Authors,                is_collection: true}
      - {id: categories,      label: Categories,             is_collection: true}
      - {id: tags,            label: Tags,                   is_collection: true}
    idap:
      - {id: idap.countries,  label: IDAP Countries,         is_collection: true,  parent_id: null}
      - {id: idap.cities,     label: IDAP Cities,            is_collection: true,  parent_id: idap.countries}
      - {id: idap.streets,    label: IDAP Streets,           is_collection: true,  parent_id: idap.cities}
      - {id: idap.businesses, label: IDAP Businesses,        is_collection: true,  parent_id: idap.cities}
    singleton:
      - {id: idap.lead,       label: IDAP Lead (singleton),  is_collection: false, parent_id: null}
        # idap.lead returns one row scoped to the visitor's request — only
        # Item Details blocks accept it. List blocks 400 on this source_id.
