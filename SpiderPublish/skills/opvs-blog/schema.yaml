name: opvs-blog
version: "1.0.0"
tier: 1
description: >
  Task-oriented lens on blog workflows. The underlying MCP tools live in the
  content-platform surface — this skill documents the common chains.

tools:
  authors:
    - content_list_authors
    - content_create_author
    - content_update_author
    - content_delete_author
  categories:
    - content_list_categories
    - content_create_category
    - content_update_category
    - content_delete_category
  tags:
    - content_list_tags
    - content_create_tag
    - content_update_tag
    - content_delete_tag
  posts:
    - content_list_posts
    - content_create_post
    - content_get_post
    - content_update_post
    - content_publish_post
    - content_unpublish_post
    - content_set_post_status
    - content_set_post_related
    - content_list_featured_posts
    - content_search_posts
    - content_delete_post

body_format: tiptap_json
read_increments_view_count: true

canonical_see_also:
  - content-platform
  - templates-engine
